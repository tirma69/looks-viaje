<style>
:root{
  --pink:#d6336c; --pink-soft:#fce4ec;
  --ink:#2a2530; --muted:#7a7280; --faint:#a39bab;
  --line:#ece7e3; --card:#fffdfb; --bg:#f7f3ef;
  --shadow:0 1px 2px rgba(60,40,55,.04),0 6px 22px rgba(60,40,55,.07);
  --radius:20px; --radius-sm:14px;
}
@media (prefers-color-scheme:dark){
  :root{
    --pink:#ff7aa8; --pink-soft:#34202a;
    --ink:#f1ecf2; --muted:#a79fb0; --faint:#6f6678;
    --line:#2b2530; --card:#1b1620; --bg:#120e16;
    --shadow:0 1px 2px rgba(0,0,0,.3),0 8px 28px rgba(0,0,0,.4);
  }
}
*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--ink);
  line-height:1.55;padding-bottom:48px;-webkit-font-smoothing:antialiased}
.wrap{max-width:720px;margin:0 auto;padding:0 16px}

header{padding:26px 0 8px;text-align:center}
.kicker{font-size:11px;letter-spacing:.24em;text-transform:uppercase;color:var(--pink);font-weight:600}
h1{font-family:'Fraunces',serif;font-weight:600;font-size:38px;line-height:1.02;margin:6px 0 4px;letter-spacing:-.01em}
.sub{font-size:13.5px;color:var(--muted)}
.fav-count{display:inline-flex;align-items:center;gap:6px;margin-top:12px;background:var(--pink-soft);
  color:var(--pink);font-weight:600;font-size:12.5px;padding:7px 15px;border-radius:999px}
.fav-count svg{width:14px;height:14px;fill:var(--pink)}

.tabs{position:sticky;top:0;z-index:50;background:var(--bg);padding:12px 0 9px;margin:0 -16px;
  padding-left:16px;padding-right:16px}
.tabs-scroll{display:flex;gap:8px;overflow-x:auto;scrollbar-width:none}
.tabs-scroll::-webkit-scrollbar{display:none}
.tab{flex:0 0 auto;border:1px solid var(--line);background:var(--card);color:var(--muted);
  padding:10px 17px;border-radius:999px;font-size:13px;font-weight:600;cursor:pointer;
  white-space:nowrap;transition:.16s;min-height:42px;display:flex;flex-direction:column;align-items:center;gap:1px;line-height:1.1;font-family:inherit}
.tab small{font-size:10px;font-weight:500;opacity:.7}
.tab:hover{border-color:var(--pink);color:var(--pink)}
.tab.active{background:var(--ink);color:var(--bg);border-color:var(--ink)}

.panel{display:none;animation:fade .28s ease}
.panel.active{display:block}
@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

.day-banner{display:flex;align-items:center;gap:14px;background:var(--card);border:1px solid var(--line);
  border-radius:var(--radius-sm);padding:15px 17px;margin:8px 0 18px;box-shadow:var(--shadow)}
.day-banner .emoji{font-size:30px;flex:0 0 auto}
.day-banner .meta{flex:1}
.day-banner .t{font-family:'Fraunces',serif;font-size:20px;font-weight:600;line-height:1.1}
.day-banner .d{font-size:12.5px;color:var(--muted);margin-top:2px}

.look{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
  margin-bottom:16px;box-shadow:var(--shadow);overflow:hidden}
.look-head{display:flex;align-items:flex-start;gap:14px;padding:18px 18px 12px}
.figure{flex:0 0 auto;width:62px;height:92px;border-radius:12px;display:flex;align-items:center;justify-content:center;
  background:var(--fig-bg,#f3eef0)}
.figure svg{width:54px;height:84px}
.look-titles{flex:1;min-width:0;padding-top:2px}
.look-num{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--faint);font-weight:600}
.look-name{font-family:'Fraunces',serif;font-size:21px;font-weight:600;line-height:1.12;margin-top:1px}
.palette{display:flex;gap:6px;margin-top:9px}
.swatch{width:22px;height:22px;border-radius:50%;box-shadow:inset 0 0 0 1px rgba(0,0,0,.08)}
.fav{flex:0 0 auto;width:44px;height:44px;border-radius:50%;border:1px solid var(--line);
  background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.18s}
.fav svg{width:22px;height:22px;fill:none;stroke:var(--faint);stroke-width:2;transition:.18s}
.fav:hover{border-color:var(--pink)}
.fav.on{background:var(--pink-soft);border-color:var(--pink)}
.fav.on svg{fill:var(--pink);stroke:var(--pink);animation:pop .3s ease}
@keyframes pop{0%{transform:scale(.6)}55%{transform:scale(1.25)}100%{transform:scale(1)}}

.look-body{padding:0 18px 18px}
.pieces{display:flex;flex-direction:column;gap:8px;margin-bottom:13px}
.piece{display:flex;align-items:center;gap:11px;font-size:13.5px}
.piece .pico{flex:0 0 auto;width:28px;height:28px;border-radius:8px;background:var(--bg);
  display:flex;align-items:center;justify-content:center}
.piece .pico svg{width:17px;height:17px;stroke:var(--muted);fill:none;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round}
.piece b{font-weight:600}
.piece .plabel{font-size:10.5px;color:var(--faint);text-transform:uppercase;letter-spacing:.06em;display:block;line-height:1.2}
.why{background:var(--pink-soft);border-radius:12px;padding:11px 14px;font-size:13px;line-height:1.5;margin-bottom:9px}
.why b{color:var(--pink)}
.tip{display:flex;gap:8px;align-items:flex-start;font-size:12.5px;color:var(--muted)}
.tip svg{flex:0 0 auto;width:15px;height:15px;stroke:var(--pink);fill:none;stroke-width:2;margin-top:2px}
.pin-btn{display:inline-flex;align-items:center;gap:8px;margin-top:13px;width:100%;justify-content:center;
  background:#e60023;color:#fff;border:none;border-radius:12px;padding:12px 16px;font-size:13.5px;
  font-weight:600;cursor:pointer;text-decoration:none;font-family:inherit;transition:.15s}
.pin-btn:hover{background:#c5001e}
.pin-btn svg{width:18px;height:18px;fill:#fff}

.toolbar{display:flex;gap:8px;justify-content:center;margin:22px 0 6px;flex-wrap:wrap}
.tool-btn{border:1px solid var(--line);background:var(--card);color:var(--muted);padding:9px 16px;
  border-radius:999px;font-size:12.5px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:7px;font-family:inherit;transition:.15s}
.tool-btn:hover{border-color:var(--pink);color:var(--pink)}
.tool-btn svg{width:15px;height:15px}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--ink);
  color:var(--bg);padding:12px 22px;border-radius:999px;font-size:13px;font-weight:600;box-shadow:0 8px 30px rgba(0,0,0,.25);transition:.3s;z-index:200;opacity:0}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}
footer{text-align:center;font-size:11px;color:var(--faint);margin-top:26px;line-height:1.6}

@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
@media (max-width:420px){h1{font-size:32px}.look-name{font-size:19px}}
</style>
</head>

    pieces:[['top','Polo de punto','verde'],['pantalon','Pantalón ancho','blanco'],['zapato','Mocasines planos','cómodos'],['accesorio','Pañuelo','amarillo al cuello']],
    why:'Look pulido en <b>verde y blanco</b>, fresco para Milán y resultón para el aeropuerto.',
    tip:'Pantalón ancho que no aprieta en el vuelo y favorece tu altura.'},
   {name:'Última foto', pin:'fuchsia midi dress white denim jacket outfit', colors:['#d6336c','#ffd23f','#ffffff'],
    pieces:[['vestido','Vestido midi vuelo','fucsia'],['capa','Chaqueta vaquera','blanca'],['zapato','Zapatillas','blancas'],['bolso','Bolso saco','amarillo']],
    why:'Para despedirse con una <b>foto en color</b> en Milano Centrale antes de volar.',
    tip:'Vaquera blanca ligera: estiliza, abriga lo justo y vale para la cabina del avión.'}
  ]}
];

/* ============ RENDER ============ */
function lookHTML(dayId, i, lk, figbg){
  const id=dayId+'_'+i, on=!!favs[id];
  const sw=lk.colors.map(c=>`<span class="swatch" style="background:${c}"></span>`).join('');
  const pieces=lk.pieces.map(p=>`<div class="piece">${pico(p[0])}<div><b>${p[1]}</b> <span class="plabel">${p[2]}</span></div></div>`).join('');
  return `<div class="look">
    <div class="look-head">
      <div class="figure" style="--fig-bg:${figbg}">${figurine(lk.colors)}</div>
      <div class="look-titles">
        <div class="look-num">Look ${i+1}</div>
        <div class="look-name">${lk.name}</div>
        <div class="palette">${sw}</div>
      </div>
      <button class="fav${on?' on':''}" id="fav-${id}" aria-label="Favorito" onclick="toggle('${id}')">
        <svg viewBox="0 0 24 24"><path d="M12 21s-7-4.4-9.5-8.5C.8 9.6 2 6 5.2 6c2 0 3.2 1.3 3.8 2.3C9.6 7.3 10.8 6 12.8 6 16 6 17.2 9.6 15.5 12.5 13 16.6 12 21 12 21z"/></svg>
      </button>
    </div>
    <div class="look-body">
      <div class="pieces">${pieces}</div>
      <div class="why">${lk.why}</div>
      <div class="tip"><svg viewBox="0 0 24 24"><path d="M12 2a7 7 0 0 0-4 12.7V17h8v-2.3A7 7 0 0 0 12 2zM9 21h6M10 17v4M14 17v4"/></svg><span>${lk.tip}</span></div>
      <a class="pin-btn" href="https://www.pinterest.com/search/pins/?q=${encodeURIComponent(lk.pin)}" target="_blank" rel="noopener">
        <svg viewBox="0 0 24 24"><path d="M12 2C6.5 2 2 6.5 2 12c0 4.2 2.6 7.8 6.3 9.2-.1-.8-.2-2 0-2.8l1.1-4.7s-.3-.6-.3-1.4c0-1.3.8-2.3 1.7-2.3.8 0 1.2.6 1.2 1.3 0 .8-.5 2-.8 3.1-.2.9.5 1.7 1.4 1.7 1.6 0 2.9-1.7 2.9-4.2 0-2.2-1.6-3.7-3.8-3.7-2.6 0-4.1 1.9-4.1 3.9 0 .8.3 1.6.7 2.1.1.1.1.2 0 .3l-.3 1.1c0 .2-.1.2-.3.1-1.2-.6-2-2.3-2-3.7 0-3 2.2-5.8 6.3-5.8 3.3 0 5.9 2.4 5.9 5.5 0 3.3-2.1 6-5 6-1 0-1.9-.5-2.2-1.1l-.6 2.3c-.2.8-.8 1.9-1.2 2.5.9.3 1.9.4 2.9.4 5.5 0 10-4.5 10-10S17.5 2 12 2z"/></svg>
        Ver ejemplos en Pinterest
      </a>
    </div>
  </div>`;
}

function build(){
  document.getElementById('tabs').innerHTML = DAYS.map((d,i)=>
    `<button class="tab${i===0?' active':''}" data-tab="${d.id}" onclick="go('${d.id}')">${d.emoji} ${d.tab}<small>${d.tabsub}</small></button>`).join('');
  document.getElementById('panels').innerHTML = DAYS.map((d,di)=>`
    <section class="panel${di===0?' active':''}" id="panel-${d.id}">
      <div class="day-banner"><div class="emoji">${d.emoji}</div><div class="meta"><div class="t">${d.title}</div><div class="d">${d.desc}</div></div></div>
      ${d.looks.map((lk,i)=>lookHTML(d.id,i,lk,d.figbg)).join('')}
    </section>`).join('');
  updateCount();
}
function go(id){
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('panel-'+id).classList.add('active');
  const b=document.querySelector(`.tab[data-tab="${id}"]`);
  b.classList.add('active'); b.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'});
  window.scrollTo({top:0,behavior:'smooth'});
}
function toggle(id){
  favs[id]=!favs[id]; if(!favs[id])delete favs[id]; save();
  document.getElementById('fav-'+id).classList.toggle('on',!!favs[id]);
  updateCount();
}
function updateCount(){
  const n=Object.keys(favs).length;
  document.getElementById('favCount').innerHTML =
    `<svg viewBox="0 0 24 24"><path d="M12 21s-7-4.4-9.5-8.5C.8 9.6 2 6 5.2 6c2 0 3.2 1.3 3.8 2.3C9.6 7.3 10.8 6 12.8 6 16 6 17.2 9.6 15.5 12.5 13 16.6 12 21 12 21z"/></svg> ${n} ${n===1?'look favorito':'looks favoritos'}`;
}
function showFavs(){
  const names=[];
  DAYS.forEach(d=>d.looks.forEach((lk,i)=>{ if(favs[d.id+'_'+i]) names.push(`${d.emoji} ${lk.name}`); }));
  if(!names.length){ showToast('Aún no has marcado favoritos'); return; }
  showToast(names.length+' favoritos: '+names.join(' · '));
}
function resetFavs(){
  if(!Object.keys(favs).length){showToast('No hay favoritos que limpiar');return;}
  if(!confirm('¿Quitar todos los favoritos?'))return;
  favs={};save();
  document.querySelectorAll('.fav').forEach(f=>f.classList.remove('on'));
  updateCount();showToast('Favoritos vacíos');
}
let tt;
function showToast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(tt);tt=setTimeout(()=>t.classList.remove('show'),3200);}
build();
</script>
</body>
</html>
